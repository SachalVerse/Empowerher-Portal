name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH into VM & Deploy Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd /opt/empowerher
            
            # 1. Clear any untracked or local modifications on the server completely
            git reset --hard origin/main
            
            # 2. Pull down the clean, absolute latest changes
            git pull origin main
            
            # 3. Stop running containers completely
            docker compose down
            
            # 4. Build completely from scratch without using cached layers
            docker compose build --no-cache app
            
            # 5. Boot the ecosystem engines up in background mode
            docker compose up -d