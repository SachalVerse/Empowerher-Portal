name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH into VM & Deploy Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd /opt/empowerher
            
            # 1. Pull down the latest changes securely
            git pull origin main
            
            # 2. Shut down the old active containers to clear memory and port hooks
            docker compose down
            
            # 3. Build and launch with forced container recreation
            docker compose up -d --build --force-recreate