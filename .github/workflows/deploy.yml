name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH into VM & Deploy Update
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_VM_IP }}
          username: ${{ secrets.ORACLE_VM_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd /opt/empowerher
            
            # 1. Fetch all updates from GitHub tracking refs first
            git fetch --all
            
            # 2. Hard reset to the absolute latest commit tracked on the main branch
            git reset --hard origin/main
            
            # 3. Clean up untracked files or cache directories safely
            git clean -fd
            
            # 4. Shut down running containers cleanly
            docker compose down
            
            # 5. Build and launch the new multi-container engine system 
            docker compose up -d --build