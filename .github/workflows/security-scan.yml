name: "DevSecOps Security Scan"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-audit:
    name: Run Security Vulnerability Scanners
    runs-on: ubuntu-latest

    steps:
      # 1. Clone source code out of your repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Run Semgrep SAST via official Docker action
      - name: Semgrep Static Application Security Testing (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/security-audit p/secrets
          args: scan --sarif --output=semgrep.sarif

      # 3. Rename SARIF output if needed by downstream artifact step
      - name: Normalize SARIF output filename
        run: |
          if [ -f "semgrep.sarif" ]; then
            echo "SARIF file generated successfully."
          elif [ -f "sast.sarif" ]; then
            mv sast.sarif semgrep.sarif
          fi

      # 4. Run Node Supply Chain Dependency Audit
      - name: Audit Node.js Project Dependencies
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high --json > npm-audit-results.json || true
          else
            echo "No package.json found, skipping npm dependency audit."
          fi

      # 5. Install Trivy CLI directly on the Ubuntu runner
      - name: Install Trivy CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      # 6. Run Trivy FS scan - prints table to logs, saves JSON for artifacts
      - name: Run Trivy FS Scan
        run: |
          trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --format table .
          trivy fs --scanners vuln,secret --severity HIGH,CRITICAL --format json --output trivy-results.json .

      # 7. Upload all security scan reports as artifacts
      - name: Upload Security Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            semgrep.sarif
            npm-audit-results.json
            trivy-results.json
          retention-days: 7
