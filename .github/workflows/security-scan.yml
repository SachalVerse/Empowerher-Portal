name: "DevSecOps Security Scan"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-audit:
    name: Run Security Vulnerability Scanners
    runs-on: ubuntu-latest

    steps:
      # 1. Clone source code out of your repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Install Semgrep and run SAST scan directly
      - name: Semgrep Static Application Security Testing (SAST)
        run: |
          pip install semgrep
          semgrep scan --config=p/security-audit --config=p/secrets --sarif --output=semgrep.sarif
        continue-on-error: true

      # 3. Run Node Supply Chain Dependency Audit
      - name: Audit Node.js Project Dependencies
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high --json > npm-audit-results.json || true
          else
            echo "No package.json found, skipping npm dependency audit."
          fi

      # 4. Scan filesystem for OS and library vulnerabilities
      - name: Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          vuln-type: 'os,library'

      # 5. Upload security reports for review
      - name: Upload Security Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            semgrep.sarif
            npm-audit-results.json
          retention-days: 7