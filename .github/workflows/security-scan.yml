name: "DevSecOps Security Scan"

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-audit:
    name: Run Security Vulnerability Scanners
    runs-on: ubuntu-latest

    steps:
      # 1. Clone source code out of your repository
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 2. Run Semgrep SAST and export the detailed logs into a JSON file
      - name: Semgrep Static Application Security Testing (SAST)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
          args: --json --output semgrep-results.json
        continue-on-error: true # Allows report uploading even if errors are caught

      # 3. Run Node Supply Chain Dependency Audit
      - name: Audit Node.js Project Dependencies
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high --json > npm-audit-results.json || true
          else
            echo "No package.json found, skipping npm dependency audit."
          fi

      # 4. Enterprise Addition: Scan Docker Environment for OS Vulnerabilities
      - name: Trivy Container Image & Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '0' # Keeps pipeline moving while logging out system issues
          severity: 'CRITICAL,HIGH'

      # 5. Enterprise Addition: Upload and Save Detailed Security Reports
      - name: Upload Security Scan Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-reports
          path: |
            semgrep-results.json
            npm-audit-results.json
          retention-days: 7 # Automatically cleans up storage after 7 days